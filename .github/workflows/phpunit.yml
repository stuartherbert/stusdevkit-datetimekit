name: Tests

on:
  pull_request:
  push:

jobs:
  tests:
    name: Tests PHP ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: [8.5]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          coverage: pcov
          php-version: ${{ matrix.php }}
          ini-values: memory_limit=-1
          tools: composer:v2, cs2pr

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: php-${{ matrix.php }}
          restore-keys: php-${{ matrix.php }}

      - name: Install highest dependencies
        run: composer install

      - name: Syntax check
        run: find src -name '*.php' | xargs php -l && find tests -name '*.php' | xargs php -l

      - name: Coding standards
        run: vendor/bin/phpcs

      - name: phpstan
        run: vendor/bin/phpstan --memory-limit=-1

      - name: Tests
        run: vendor/bin/phpunit --testsuite=unit --display-all-issues --testdox
